packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  "@biomejs/biome": true
  "@bundled-es-modules/glob": true
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  nx: true
  rolldown: true
  style-dictionary: true

autoInstallPeers: true

overrides:
  vite: "npm:rolldown-vite@6.3.16"

peerDependencyRules:
  allowedVersions:
    react: "19"
    rollup: "4"
    vite: "6"

strictPeerDependencies: true
